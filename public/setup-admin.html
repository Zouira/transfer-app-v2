<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Transfer App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #d35400; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #d35400;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #e67e22; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        a { color: #d35400; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Setup Admin</h1>
        <p>Créer un compte administrateur</p>
        
        <input type="text" id="username" placeholder="Nom d'utilisateur (défaut: admin)" value="admin">
        <input type="password" id="password" placeholder="Mot de passe (défaut: admin123)" value="admin123">
        
        <button onclick="createAdmin()">Créer l'admin</button>
        
        <div id="message"></div>
        
        <p style="margin-top: 30px;">
            <a href="/login.html">← Aller à la page de connexion</a>
        </p>
    </div>

    <script>
        async function createAdmin() {
            const username = document.getElementById('username').value || 'admin';
            const password = document.getElementById('password').value || 'admin123';
            const msgDiv = document.getElementById('message');
            
            try {
                const res = await fetch('/api/setup-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    msgDiv.innerHTML = `
                        <div class="message success">
                            ✅ Admin créé avec succès !<br>
                            <strong>Login: ${username}</strong><br>
                            <strong>Password: ${password}</strong>
                        </div>
                    `;
                } else {
                    msgDiv.innerHTML = `
                        <div class="message error">
                            ❌ Erreur: ${data.error}
                        </div>
                    `;
                }
            } catch (err) {
                msgDiv.innerHTML = `
                    <div class="message error">
                        ❌ Erreur réseau: ${err.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
